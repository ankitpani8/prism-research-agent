# Prism — app (FastAPI surface) + persistent Chroma volume. Ollama runs on the
# HOST and is reached via OLLAMA_HOST=host.docker.internal so the critic's local
# model stays off the container's RAM budget. In a no-Ollama cloud deploy, the
# critic role-router falls back to a hosted small model (see core/byok.py).
services:
  prism-api:
    build: .
    image: prism-research-agent:latest
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma-data:/app/data/local/chroma
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx,sys; sys.exit(0 if httpx.get('http://localhost:8000/health').status_code==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

volumes:
  chroma-data:
