name: ci
on:
  push:
  pull_request:

jobs:
  lint-test-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps (no torch; ONNX embeddings)
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test rail (keyless — fake models, offline Chroma, stubbed search)
        run: pytest -q
      - name: Eval smoke (deterministic groundedness + regression)
        run: python eval/run_eval.py
